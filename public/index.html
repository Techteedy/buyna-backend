<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUYNA — your business, for Pidgin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F6F1E4;
    --card: #FFFFF9;
    --ink: #232120;
    --ink-soft: #7A7264;
    --ink-faint: #B7AE9C;
    --stamp-blue: #2B3A67;
    --stamp-blue-soft: #E7EAF2;
    --stamp-green: #1F7A4D;
    --stamp-green-soft: #E5F2EB;
    --stamp-red: #B23B2E;
    --stamp-red-soft: #FAEAE6;
    --stamp-gold: #B5780C;
    --stamp-gold-soft: #F8EFDC;
    --rule: #E6DFCC;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Plus Jakarta Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'Space Mono', monospace; }
  .display { font-family: 'Fraunces', serif; }

  .header {
    padding: 28px 20px 20px;
    text-align: center;
    border-bottom: 1px solid var(--rule);
  }
  .wordmark {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 30px;
    letter-spacing: -0.01em;
  }
  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 4px;
  }

  .container { max-width: 460px; margin: 0 auto; padding: 18px 16px 70px; }

  /* Trader identity ticket */
  .ticket {
    background: var(--card);
    border: 1px dashed var(--ink-faint);
    border-radius: 4px;
    padding: 12px 14px;
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .ticket .ticket-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .ticket input {
    flex: 1; border: none; background: none; font-family: 'Space Mono', monospace;
    font-size: 14px; color: var(--ink); outline: none; min-width: 0;
  }
  .ticket button {
    background: var(--stamp-blue); color: white; border: none; border-radius: 3px;
    padding: 7px 12px; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600;
    font-size: 12px; cursor: pointer; white-space: nowrap;
  }

  /* Voice section */
  .mic-section { text-align: center; margin: 8px 0 26px; }
  .mic-button {
    width: 96px; height: 96px; border-radius: 50%; background: var(--stamp-blue); border: none;
    color: white; font-size: 32px; cursor: pointer;
    box-shadow: 0 0 0 6px var(--stamp-blue-soft);
    transition: transform 0.15s;
  }
  .mic-button:active { transform: scale(0.96); }
  .mic-button.listening { background: var(--stamp-red); box-shadow: 0 0 0 6px var(--stamp-red-soft); animation: pulse 1.3s infinite; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 6px var(--stamp-red-soft); }
    70% { box-shadow: 0 0 0 16px transparent; }
    100% { box-shadow: 0 0 0 6px var(--stamp-red-soft); }
  }
  .mic-label {
    margin-top: 12px; font-family: 'Space Mono', monospace; font-size: 12px;
    font-style: italic; color: var(--ink-soft);
  }

  .voice-log { margin-top: 16px; text-align: left; }
  .bubble {
    border-radius: 10px; padding: 10px 13px; margin-bottom: 7px; font-size: 13.5px; line-height: 1.4;
    max-width: 92%;
  }
  .bubble.you { background: #EDEAE0; color: var(--ink-soft); margin-right: auto; }
  .bubble.buyna { background: var(--stamp-blue-soft); color: var(--ink); margin-left: auto; }
  .bubble-label {
    font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--ink-faint); margin-bottom: 3px;
  }

  /* Receipt cards — the signature element */
  .receipt-shadow {
    margin-bottom: 18px;
    filter: drop-shadow(0 2px 5px rgba(35,33,32,0.10));
  }
  .receipt-card {
    background: var(--card);
    padding: 18px 18px 16px;
    clip-path: polygon(
      0% 9px, 3.8% 0%, 7.6% 9px, 11.4% 0%, 15.2% 9px, 19% 0%, 22.8% 9px, 26.6% 0%,
      30.4% 9px, 34.2% 0%, 38% 9px, 41.8% 0%, 45.6% 9px, 49.4% 0%, 53.2% 9px, 57% 0%,
      60.8% 9px, 64.6% 0%, 68.4% 9px, 72.2% 0%, 76% 9px, 79.8% 0%, 83.6% 9px, 87.4% 0%,
      91.2% 9px, 95% 0%, 98.8% 9px, 100% 6px, 100% 100%, 0% 100%
    );
    padding-top: 22px;
  }
  .receipt-card.warning { background: var(--stamp-red-soft); }
  .receipt-card.highlight { background: var(--stamp-blue-soft); }

  .card-eyebrow {
    font-family: 'Space Mono', monospace; font-size: 10.5px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-soft); margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .ledger-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 5px 0; font-size: 14.5px; border-bottom: 1px dotted var(--rule);
  }
  .ledger-row:last-child { border-bottom: none; }
  .ledger-row .label { color: var(--ink-soft); }
  .ledger-row .value { font-family: 'Space Mono', monospace; font-weight: 700; }
  .ledger-row .value.green { color: var(--stamp-green); }
  .ledger-row .value.red { color: var(--stamp-red); }

  .stamp {
    display: inline-block; font-family: 'Space Mono', monospace; font-size: 9.5px;
    letter-spacing: 0.06em; text-transform: uppercase; font-weight: 700;
    border: 1.5px solid currentColor; border-radius: 4px; padding: 1px 6px;
    transform: rotate(-3deg); margin-left: 6px;
  }
  .stamp.low { color: var(--stamp-red); }
  .stamp.apprentice { color: var(--stamp-gold); }

  .empty-state {
    color: var(--ink-faint); font-size: 13px; font-style: italic; padding: 6px 0;
  }

  .progress-track { background: var(--rule); border-radius: 6px; height: 6px; margin-top: 6px; overflow: hidden; }
  .progress-fill { background: var(--stamp-green); height: 100%; }

  .task-card {
    background: var(--stamp-gold-soft);
  }
  .task-card .card-eyebrow { color: var(--stamp-gold); }

  .footer-line {
    text-align: center; font-family: 'Space Mono', monospace; font-style: italic;
    font-size: 11px; color: var(--ink-faint); margin-top: 28px; letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="header">
  <div class="wordmark">BUYNA</div>
  <div class="eyebrow">Pidgin-first business ledger</div>
</div>

<div class="container">
  <div class="ticket">
    <span class="ticket-label">Trading as</span>
    <input type="text" id="phoneInput" placeholder="phone number">
    <button id="usePhoneBtn">Switch</button>
  </div>

  <div class="mic-section">
    <button class="mic-button" id="micBtn">&#127908;</button>
    <div class="mic-label" id="micLabel">tap to talk</div>
    <div class="voice-log" id="voiceLog"></div>
  </div>

  <div id="dashboard"></div>

  <div class="footer-line">— end of report —</div>
</div>

<script>
const phoneInput = document.getElementById('phoneInput');
const usePhoneBtn = document.getElementById('usePhoneBtn');
const micBtn = document.getElementById('micBtn');
const micLabel = document.getElementById('micLabel');
const voiceLog = document.getElementById('voiceLog');
const dashboardEl = document.getElementById('dashboard');

function getPhone() { return localStorage.getItem('buyna_phone') || ''; }
function setPhone(p) { localStorage.setItem('buyna_phone', p); phoneInput.value = p; }
function formatNaira(n) { return '₦' + Number(n || 0).toLocaleString('en-NG'); }
function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function card(eyebrow, innerHtml, cls) {
  return `<div class="receipt-shadow"><div class="receipt-card${cls ? ' ' + cls : ''}">
    <div class="card-eyebrow"><span>${eyebrow}</span></div>
    ${innerHtml}
  </div></div>`;
}

async function loadDashboard() {
  const phone = getPhone();
  if (!phone) {
    dashboardEl.innerHTML = '<div class="empty-state">Enter your phone number above to open your ledger.</div>';
    return;
  }
  try {
    const res = await fetch('/api/dashboard/' + encodeURIComponent(phone));
    const d = await res.json();
    renderDashboard(d);
  } catch (err) {
    dashboardEl.innerHTML = '<div class="empty-state">Could not load your ledger. Check your connection.</div>';
  }
}

function renderDashboard(d) {
  let html = '';

  if (d.todayTask) {
    html += card(`Day ${d.todayTask.day} of 90 — today's task`,
      `<div style="font-size:14px;line-height:1.5">${d.todayTask.task}</div>`, 'task-card');
  }

  if (d.capitalStatus) {
    const cs = d.capitalStatus;
    let rows = `
      <div class="ledger-row"><span class="label">Capital</span><span class="value">${formatNaira(cs.capital)}</span></div>
      <div class="ledger-row"><span class="label">Spent so far</span><span class="value red">${formatNaira(cs.spent)}</span></div>
      <div class="ledger-row"><span class="label">Remaining</span><span class="value">${formatNaira(cs.remaining)}</span></div>`;
    if (cs.daysLeft !== null) {
      rows += `<div class="ledger-row"><span class="label">${cs.warning ? '⚠ ' : ''}Days left at this rate</span><span class="value${cs.warning ? ' red' : ''}">${cs.daysLeft}</span></div>`;
    }
    html += card('Capital status', rows, cs.warning ? 'warning' : '');
  }

  html += card('Today', `
    <div class="ledger-row"><span class="label">Sales rung up</span><span class="value">${d.today.count}</span></div>
    <div class="ledger-row"><span class="label">Total</span><span class="value">${formatNaira(d.today.total)}</span></div>
    <div class="ledger-row"><span class="label">Profit</span><span class="value green">${formatNaira(d.today.profit)}</span></div>
    <div class="ledger-row"><span class="label">Expenses</span><span class="value red">${formatNaira(d.today.expenses)}</span></div>
  `, 'highlight');

  html += card('Last 7 days', `
    <div class="ledger-row"><span class="label">Total</span><span class="value">${formatNaira(d.week.total)}</span></div>
    <div class="ledger-row"><span class="label">Profit</span><span class="value green">${formatNaira(d.week.profit)}</span></div>
    <div class="ledger-row"><span class="label">Expenses</span><span class="value red">${formatNaira(d.week.expenses)}</span></div>
  `);

  let stockRows = !d.stock.length
    ? `<div class="empty-state">No stock rung up yet.</div>`
    : d.stock.map(s => `<div class="ledger-row"><span class="label">${s.item}${s.isLow ? '<span class="stamp low">low</span>' : ''}</span><span class="value">${s.quantity}${s.unitCost > 0 ? ' <span style="color:var(--ink-faint);font-weight:400">@ ' + formatNaira(s.unitCost) + '</span>' : ''}</span></div>`).join('');
  html += card('Stock on hand', stockRows);

  let debtRows = !d.debts.length
    ? `<div class="empty-state">Nobody owes you right now.</div>`
    : d.debts.map(deb => `<div class="ledger-row"><span class="label">${deb.customerName}</span><span class="value red">${formatNaira(deb.amount)}</span></div>`).join('');
  html += card('Customers who owe you', debtRows);

  let koloRows = !d.kolo.length
    ? `<div class="empty-state">No Kolo savings yet — say "I save 1000" to start.</div>`
    : d.kolo.map(k => {
        const pct = k.targetAmount > 0 ? Math.min(100, Math.round((k.savedAmount / k.targetAmount) * 100)) : null;
        return `<div style="margin-bottom:8px">
          <div class="ledger-row" style="border-bottom:none"><span class="label">${k.goalName}</span><span class="value">${formatNaira(k.savedAmount)}${k.targetAmount > 0 ? ' / ' + formatNaira(k.targetAmount) : ''}</span></div>
          ${pct !== null ? `<div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>` : ''}
        </div>`;
      }).join('');
  html += card('Kolo savings', koloRows);

  if (d.recipes.length) {
    const rows = d.recipes.map(r => `<div class="ledger-row"><span class="label">${r.name}</span><span class="value">${formatNaira(r.costPerItem)} <span style="color:var(--ink-faint);font-weight:400">/ item</span></span></div>`).join('');
    html += card('Recipe costs', rows);
  }

  if (d.apprentices.length) {
    const rows = d.apprentices.map(a => `<div class="ledger-row"><span class="label">${a.name}<span class="stamp apprentice">apprentice</span></span><span class="value" style="font-size:12px;color:var(--ink-soft)">${a.phone}</span></div>`).join('');
    html += card('Apprentices', rows);
  }

  let notifRows = !d.notifications.length
    ? `<div class="empty-state">No notifications.</div>`
    : d.notifications.map(n => `<div class="ledger-row"><span class="label" style="font-size:13px">${n.message}</span><span class="value" style="font-size:11px;font-weight:400;color:var(--ink-faint)">${timeAgo(n.createdAt)}</span></div>`).join('');
  html += card('Notifications', notifRows);

  let salesRows = !d.recentSales.length
    ? `<div class="empty-state">No sales rung up yet.</div>`
    : d.recentSales.map(s => `<div class="ledger-row"><span class="label">${s.item}${s.recordedBy === 'apprentice' ? '<span class="stamp apprentice">apprentice</span>' : ''}</span><span class="value">${formatNaira(s.amount)}</span></div>`).join('');
  html += card('Recent sales', salesRows);

  let expenseRows = !d.recentExpenses.length
    ? `<div class="empty-state">No expenses rung up yet.</div>`
    : d.recentExpenses.map(e => `<div class="ledger-row"><span class="label">${e.category}</span><span class="value red">${formatNaira(e.amount)}</span></div>`).join('');
  html += card('Recent expenses', expenseRows);

  dashboardEl.innerHTML = html;
}

usePhoneBtn.addEventListener('click', () => {
  const p = phoneInput.value.trim();
  if (p) { setPhone(p); loadDashboard(); }
});

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let listening = false;

function renderVoiceCard(label, text, cls) {
  const div = document.createElement('div');
  div.className = 'bubble ' + (cls || 'you');
  div.innerHTML = `<div class="bubble-label">${label}</div><div></div>`;
  div.querySelector('div:last-child').textContent = text;
  voiceLog.prepend(div);
}

async function sendToBuyna(text) {
  const phone = getPhone();
  if (!phone) { renderVoiceCard('Error', 'Enter your phone number first.'); return; }
  renderVoiceCard('You said', text, 'you');
  try {
    const res = await fetch('/voice', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, text }),
    });
    const data = await res.json();
    renderVoiceCard('BUYNA say', data.reply, 'buyna');
    speak(data.reply);
    loadDashboard();
  } catch (err) {
    renderVoiceCard('Error', 'Network problem — try again.', 'you');
  }
}

function speak(text) {
  if (!window.speechSynthesis) return;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-NG';
  utter.rate = 0.95;
  window.speechSynthesis.speak(utter);
}

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = 'en-NG';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  recognition.onresult = (event) => sendToBuyna(event.results[0][0].transcript);
  recognition.onerror = () => { micLabel.textContent = 'did not catch that — tap to try again'; };
  recognition.onend = () => {
    listening = false;
    micBtn.classList.remove('listening');
    if (micLabel.textContent === 'listening...') micLabel.textContent = 'tap to talk';
  };
  micBtn.addEventListener('click', () => {
    if (listening) return;
    listening = true;
    micBtn.classList.add('listening');
    micLabel.textContent = 'listening...';
    recognition.start();
  });
} else {
  micBtn.style.display = 'none';
  micLabel.textContent = 'voice needs Chrome or Edge';
}

const savedPhone = getPhone();
if (savedPhone) phoneInput.value = savedPhone;
loadDashboard();
</script>

</body>
</html>
