<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUYNA — your shop ledger, for Pidgin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F6F1E4;
    --card: #FFFFF9;
    --ink: #232120;
    --ink-soft: #7A7264;
    --ink-faint: #B7AE9C;
    --sidebar: #1C2541;
    --sidebar-soft: #2C3A63;
    --stamp-blue: #2B3A67;
    --stamp-blue-soft: #E7EAF2;
    --stamp-green: #1F7A4D;
    --stamp-green-soft: #E5F2EB;
    --stamp-red: #B23B2E;
    --stamp-red-soft: #FAEAE6;
    --stamp-gold: #C8870E;
    --stamp-gold-soft: #F8EFDC;
    --rule: #E6DFCC;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Plus Jakarta Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'Space Mono', monospace; }

  .app { display: flex; min-height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 230px; flex-shrink: 0; background: var(--sidebar); color: #EDEAE0;
    padding: 22px 14px; display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto;
    transition: transform 0.25s ease; z-index: 50;
  }
  .sidebar-brand { padding: 4px 10px 18px; }
  .sidebar-wordmark { font-family: 'Fraunces', serif; font-weight: 700; font-size: 24px; color: #fff; }
  .sidebar-tagline { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.06em; color: #9098B8; margin-top: 3px; }

  .nav-item {
    display: flex; align-items: center; gap: 11px; width: 100%; text-align: left;
    background: none; border: none; color: #C7CCE0; padding: 10px 10px; border-radius: 8px;
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; margin-bottom: 2px; border-left: 3px solid transparent;
  }
  .nav-item:hover { background: var(--sidebar-soft); }
  .nav-item.active { background: var(--sidebar-soft); color: #fff; border-left-color: var(--stamp-gold); font-weight: 600; }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
  .nav-item .badge-dot {
    margin-left: auto; background: var(--stamp-red); color: white; font-size: 10px; font-weight: 700;
    border-radius: 10px; padding: 1px 6px; font-family: 'Space Mono', monospace;
  }

  .sidebar-footer { margin-top: auto; padding: 10px; }
  .trading-ticket { background: var(--sidebar-soft); border-radius: 8px; padding: 10px 12px; }
  .trading-ticket-label { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.06em; color: #9098B8; margin-bottom: 5px; }
  .trading-ticket input {
    width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 5px; padding: 6px 8px; color: #fff; font-family: 'Space Mono', monospace; font-size: 12px; margin-bottom: 6px;
  }
  .trading-ticket button {
    width: 100%; background: var(--stamp-gold); color: #2A1C00; border: none; border-radius: 5px;
    padding: 7px; font-weight: 700; font-size: 12px; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
  }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 40; }

  /* Main */
  .main { flex: 1; margin-left: 230px; min-height: 100vh; display: flex; flex-direction: column; }
  .topbar {
    padding: 14px 28px; border-bottom: 1px solid var(--rule); display: flex;
    align-items: center; gap: 14px; background: var(--paper);
    position: sticky; top: 0; z-index: 10;
  }
  .hamburger {
    display: none; width: 36px; height: 36px; border-radius: 8px; border: none;
    background: var(--sidebar); color: white; font-size: 17px; cursor: pointer; flex-shrink: 0;
  }
  .topbar-wordmark { font-family: 'Fraunces', serif; font-weight: 700; font-size: 19px; color: var(--stamp-blue); flex-shrink: 0; }
  .topbar-divider { width: 1px; height: 22px; background: var(--rule); flex-shrink: 0; }
  .page-title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 19px; }
  .page-subtitle { font-family: 'Space Mono', monospace; font-size: 10.5px; color: var(--ink-soft); margin-top: 1px; }

  .page-content { padding: 24px 28px 90px; max-width: 760px; }

  /* Phone entry banner on Home */
  .phone-banner {
    background: var(--stamp-blue); color: white; border-radius: 12px; padding: 16px 18px; margin-bottom: 18px;
  }
  .phone-banner .label { font-family: 'Space Mono', monospace; font-size: 11px; color: #C7CCE0; margin-bottom: 8px; }
  .phone-banner .row { display: flex; gap: 8px; }
  .phone-banner input {
    flex: 1; padding: 10px 12px; border-radius: 8px; border: none; font-family: 'Space Mono', monospace; font-size: 14px;
  }
  .phone-banner button {
    background: var(--stamp-gold); color: #2A1C00; border: none; border-radius: 8px; padding: 10px 16px;
    font-weight: 700; font-size: 13px; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
  }

  /* Receipt cards */
  .receipt-shadow { margin-bottom: 16px; filter: drop-shadow(0 2px 5px rgba(35,33,32,0.10)); }
  .receipt-card {
    background: var(--card); padding: 20px 20px 17px;
    clip-path: polygon(
      0% 9px, 3.8% 0%, 7.6% 9px, 11.4% 0%, 15.2% 9px, 19% 0%, 22.8% 9px, 26.6% 0%,
      30.4% 9px, 34.2% 0%, 38% 9px, 41.8% 0%, 45.6% 9px, 49.4% 0%, 53.2% 9px, 57% 0%,
      60.8% 9px, 64.6% 0%, 68.4% 9px, 72.2% 0%, 76% 9px, 79.8% 0%, 83.6% 9px, 87.4% 0%,
      91.2% 9px, 95% 0%, 98.8% 9px, 100% 6px, 100% 100%, 0% 100%
    );
    padding-top: 23px;
  }
  .receipt-card.warning { background: var(--stamp-red-soft); }
  .receipt-card.highlight { background: var(--stamp-blue-soft); }
  .receipt-card.gold { background: var(--stamp-gold-soft); }

  .card-eyebrow {
    font-family: 'Space Mono', monospace; font-size: 10.5px; letter-spacing: 0.08em;
    color: var(--ink-soft); margin-bottom: 11px;
  }
  .ledger-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 6px 0; font-size: 14.5px; border-bottom: 1px dotted var(--rule);
  }
  .ledger-row:last-child { border-bottom: none; }
  .ledger-row .label { color: var(--ink-soft); }
  .ledger-row .value { font-family: 'Space Mono', monospace; font-weight: 700; }
  .ledger-row .value.green { color: var(--stamp-green); }
  .ledger-row .value.red { color: var(--stamp-red); }

  .stamp {
    display: inline-block; font-family: 'Space Mono', monospace; font-size: 9.5px;
    letter-spacing: 0.04em; font-weight: 700;
    border: 1.5px solid currentColor; border-radius: 4px; padding: 1px 6px;
    transform: rotate(-3deg); margin-left: 6px;
  }
  .stamp.low { color: var(--stamp-red); }

  .empty-state { color: var(--ink-faint); font-size: 13px; font-style: italic; padding: 4px 0; }

  .progress-track { background: var(--rule); border-radius: 6px; height: 6px; margin-top: 6px; overflow: hidden; }
  .progress-fill { background: var(--stamp-green); height: 100%; }

  /* Quick-action forms */
  .quick-form { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .quick-form .row { display: flex; gap: 8px; }
  .quick-form input, .quick-form textarea {
    flex: 1; padding: 9px 11px; border: 1px solid var(--rule); border-radius: 6px;
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; background: #fff;
  }
  .quick-form textarea { resize: vertical; min-height: 60px; }
  .quick-form button {
    background: var(--stamp-blue); color: white; border: none; border-radius: 6px;
    padding: 10px 16px; font-weight: 700; font-size: 13px; cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .quick-form button.secondary { background: var(--ink-faint); }
  .form-hint { font-size: 12px; color: var(--ink-faint); font-style: italic; }
  .reply-banner {
    background: var(--stamp-green-soft); border-radius: 8px; padding: 12px 14px;
    font-size: 13.5px; margin-bottom: 16px; line-height: 1.4;
  }
  .reply-banner.error { background: var(--stamp-red-soft); }

  /* Mic FAB + voice panel */
  .mic-fab {
    position: fixed; bottom: 26px; right: 26px; width: 60px; height: 60px; border-radius: 50%;
    background: var(--stamp-blue); color: white; border: none; font-size: 26px; cursor: pointer;
    box-shadow: 0 4px 14px rgba(43,58,103,0.4); z-index: 30;
  }
  .mic-fab.listening { background: var(--stamp-red); animation: pulse 1.3s infinite; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(178,59,46,0.5); }
    70% { box-shadow: 0 0 0 16px rgba(178,59,46,0); }
    100% { box-shadow: 0 0 0 0 rgba(178,59,46,0); }
  }
  .voice-panel {
    position: fixed; bottom: 0; right: 0; left: 0; background: var(--card);
    border-top-left-radius: 16px; border-top-right-radius: 16px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.15); max-height: 60vh; overflow-y: auto;
    transform: translateY(100%); transition: transform 0.25s ease; z-index: 35;
    padding: 16px 20px 24px;
  }
  .voice-panel.open { transform: translateY(0); }
  .voice-panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .voice-panel-title { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--ink-soft); }
  .voice-panel-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--ink-soft); }
  .bubble { border-radius: 10px; padding: 10px 13px; margin-bottom: 7px; font-size: 13.5px; line-height: 1.4; max-width: 92%; }
  .bubble.you { background: #EDEAE0; color: var(--ink-soft); margin-right: auto; }
  .bubble.buyna { background: var(--stamp-blue-soft); color: var(--ink); margin-left: auto; }
  .bubble-label { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--ink-faint); margin-bottom: 3px; }

  @media (max-width: 800px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; }
    .hamburger { display: block; }
    .overlay.open { display: block; }
    .page-content { padding: 20px 16px 90px; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="overlay" id="overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-wordmark">BUYNA</div>
      <div class="sidebar-tagline">Na your shop ledger, for Pidgin</div>
    </div>

    <button class="nav-item active" data-page="home">${'icon_home'}<span>Home</span></button>
    <button class="nav-item" data-page="sales">${'icon_sales'}<span>Sale</span></button>
    <button class="nav-item" data-page="expenses">${'icon_expenses'}<span>Spend &amp; Capital</span></button>
    <button class="nav-item" data-page="kolo">${'icon_kolo'}<span>Kolo</span></button>
    <button class="nav-item" data-page="debts">${'icon_debts'}<span>Debt</span></button>
    <button class="nav-item" data-page="stock">${'icon_stock'}<span>Stock</span></button>
    <button class="nav-item" data-page="tools">${'icon_tools'}<span>Business Tools</span></button>
    <button class="nav-item" data-page="notifications">${'icon_bell'}<span>Alert</span><span class="badge-dot" id="notifBadge" style="display:none">0</span></button>
    <button class="nav-item" data-page="settings">${'icon_settings'}<span>Setting</span></button>

    <div class="sidebar-footer">
      <div class="trading-ticket">
        <div class="trading-ticket-label">Na you be</div>
        <input type="text" id="phoneInputSidebar" placeholder="your phone number">
        <button id="usePhoneBtnSidebar">Change account</button>
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="hamburger" id="hamburgerBtn">&#9776;</button>
      <div class="topbar-wordmark">BUYNA</div>
      <div class="topbar-divider"></div>
      <div>
        <div class="page-title" id="pageTitle">Home</div>
        <div class="page-subtitle" id="pageSubtitle"></div>
      </div>
    </header>
    <div class="page-content" id="pageContent"></div>
  </main>

  <button class="mic-fab" id="micFab">&#127908;</button>
  <div class="voice-panel" id="voicePanel">
    <div class="voice-panel-header">
      <div class="voice-panel-title">Yarn BUYNA</div>
      <button class="voice-panel-close" id="voicePanelClose">&times;</button>
    </div>
    <div style="text-align:center;margin-bottom:10px">
      <button class="mic-fab" id="micBtnInner" style="position:static;width:50px;height:50px;font-size:20px"></button>
      <div class="form-hint" id="micLabel" style="margin-top:6px">tap make you talk, or type for below</div>
    </div>
    <div class="quick-form" style="margin-bottom:12px">
      <div class="row">
        <input type="text" id="voiceTextInput" placeholder='e.g. "I sell rice for 5000"'>
        <button id="voiceTextSend">Send</button>
      </div>
    </div>
    <div id="voiceLog"></div>
  </div>
</div>

<script>
// ---------- Icons (inline SVG, consistent stroke style) ----------
const ICONS = {
  icon_home: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11l9-7 9 7"/><path d="M5 10v9a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1v-9"/></svg>',
  icon_sales: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7h18l-1.5 10a2 2 0 01-2 1.7H6.5a2 2 0 01-2-1.7L3 7z"/><path d="M8 7V5a4 4 0 018 0v2"/></svg>',
  icon_expenses: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2v20M17 5H9.5a2.5 2.5 0 000 5h5a2.5 2.5 0 010 5H7"/></svg>',
  icon_kolo: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>',
  icon_debts: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3"/><path d="M2 20c0-3.3 3-5.5 7-5.5s7 2.2 7 5.5"/><path d="M16 4.5a3 3 0 010 7M21 20c0-2.6-1.8-4.6-4.5-5.3"/></svg>',
  icon_stock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 7v10l9 4 9-4V7M3 7l9 4 9-4"/></svg>',
  icon_tools: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14.7 6.3a4 4 0 00-5.4 5.4L3 18l3 3 6.3-6.3a4 4 0 005.4-5.4l-2.3 2.3-2.3-.7-.7-2.3z"/></svg>',
  icon_bell: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 9a6 6 0 1112 0c0 4 1.5 5.5 1.5 6.5H4.5C4.5 14.5 6 13 6 9z"/><path d="M9.5 19a2.5 2.5 0 005 0"/></svg>',
  icon_settings: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 13a1.6 1.6 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.6 1.6 0 00-1.8-.3 1.6 1.6 0 00-1 1.5V19a2 2 0 11-4 0v-.1a1.6 1.6 0 00-1-1.5 1.6 1.6 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.6 1.6 0 00.3-1.8 1.6 1.6 0 00-1.5-1H5a2 2 0 110-4h.1a1.6 1.6 0 001.5-1 1.6 1.6 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.6 1.6 0 001.8.3h0a1.6 1.6 0 001-1.5V5a2 2 0 114 0v.1a1.6 1.6 0 001 1.5 1.6 1.6 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.6 1.6 0 00-.3 1.8v0a1.6 1.6 0 001.5 1H19a2 2 0 110 4h-.1a1.6 1.6 0 00-1.5 1z"/></svg>',
};

document.querySelectorAll('.nav-item').forEach(btn => {
  Object.keys(ICONS).forEach(key => {
    btn.innerHTML = btn.innerHTML.replace('${\'' + key + '\'}', ICONS[key]);
  });
});

// ---------- State ----------
let dashboardData = null;
let currentPage = 'home';

const PAGE_META = {
  home: { title: 'Home', subtitle: 'Wetin dey happen for your shop' },
  sales: { title: 'Sale', subtitle: 'Everything wey you don sell' },
  expenses: { title: 'Spend &amp; Capital', subtitle: 'Where your money dey go' },
  kolo: { title: 'Kolo', subtitle: 'Save am with one purpose' },
  debts: { title: 'Debt', subtitle: 'People wey owe you' },
  stock: { title: 'Stock', subtitle: 'Wetin you get for hand' },
  tools: { title: 'Business Tools', subtitle: 'Sabi am before you start' },
  notifications: { title: 'Alert', subtitle: 'Wetin happen while you no dey' },
  settings: { title: 'Setting', subtitle: 'Protect your account well well' },
};

function getPhone() { return localStorage.getItem('buyna_phone') || ''; }
function setPhone(p) { localStorage.setItem('buyna_phone', p); document.getElementById('phoneInputSidebar').value = p; }
function getStoredPin() { return sessionStorage.getItem('buyna_pin') || ''; }
function setStoredPin(p) { sessionStorage.setItem('buyna_pin', p); }
function clearStoredPin() { sessionStorage.removeItem('buyna_pin'); }
function formatNaira(n) { return '₦' + Number(n || 0).toLocaleString('en-NG'); }
function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}
function card(eyebrow, innerHtml, cls) {
  return `<div class="receipt-shadow"><div class="receipt-card${cls ? ' ' + cls : ''}">
    <div class="card-eyebrow">${eyebrow}</div>${innerHtml}
  </div></div>`;
}

async function pinAwareFetch(url, options = {}) {
  options.headers = options.headers || {};
  const pin = getStoredPin();
  if (pin) options.headers['x-buyna-pin'] = pin;

  let res = await fetch(url, options);
  if (res.status === 401) {
    const phone = getPhone();
    const entered = prompt('Abeg enter your BUYNA PIN make I show your ledger:');
    if (!entered) throw new Error('PIN required');

    const verifyRes = await fetch('/api/auth/verify-pin', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, pin: entered }),
    });
    const verifyData = await verifyRes.json();
    if (!verifyData.valid) {
      alert('That PIN no correct. Try again.');
      throw new Error('Wrong PIN');
    }
    setStoredPin(entered);
    options.headers['x-buyna-pin'] = entered;
    res = await fetch(url, options);
  }
  return res;
}

async function loadDashboard() {
  const phone = getPhone();
  if (!phone) { dashboardData = null; renderPage(); return; }
  try {
    const res = await pinAwareFetch('/api/dashboard/' + encodeURIComponent(phone));
    dashboardData = await res.json();
  } catch (err) {
    dashboardData = null;
  }
  updateNotifBadge();
  renderPage();
}

function updateNotifBadge() {
  const badge = document.getElementById('notifBadge');
  const unread = dashboardData ? dashboardData.notifications.filter(n => !n.isRead).length : 0;
  badge.style.display = unread > 0 ? 'inline-block' : 'none';
  badge.textContent = unread;
}

async function sendCommand(text, onDone) {
  const phone = getPhone();
  if (!phone) { alert('Abeg enter your phone number first.'); return; }
  try {
    const res = await pinAwareFetch('/voice', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, text }),
    });
    const data = await res.json();
    await loadDashboard();
    if (onDone) onDone(data.reply, false);
  } catch (err) {
    if (onDone) onDone('Network no dey work — try again.', true);
  }
}

function replyBanner(text, isError) {
  return `<div class="reply-banner${isError ? ' error' : ''}">${text}</div>`;
}

function phoneBanner() {
  const phone = getPhone();
  if (phone) return '';
  return `<div class="phone-banner">
    <div class="label">Enter your phone number make I show your ledger</div>
    <div class="row">
      <input type="text" id="phoneInputHome" placeholder="your phone number">
      <button id="usePhoneBtnHome">Open my ledger</button>
    </div>
  </div>`;
}

// ---------- Page renderers ----------
function pageHome() {
  let html = phoneBanner();
  if (!dashboardData) {
    if (!getPhone()) return html;
    html += `<div class="empty-state">No fit load your ledger now. Check your connection.</div>`;
    return html;
  }
  const d = dashboardData;

  if (d.todayTask) {
    html += card(`Day ${d.todayTask.day} of 90 — wetin to do today`, `<div style="font-size:14px;line-height:1.5">${d.todayTask.task}</div>`, 'gold');
  }
  html += card('Today', `
    <div class="ledger-row"><span class="label">Sale wey you ring</span><span class="value">${d.today.count}</span></div>

const PAGE_RENDERERS = {
  home: pageHome, sales: pageSales, expenses: pageExpenses, kolo: pageKolo,
  debts: pageDebts, stock: pageStock, tools: pageTools,
  notifications: pageNotifications, settings: pageSettings,
};

let lastBanner = '';

function renderPage() {
  document.getElementById('pageTitle').innerHTML = PAGE_META[currentPage].title;
  document.getElementById('pageSubtitle').textContent = PAGE_META[currentPage].subtitle;
  const html = (lastBanner ? lastBanner : '') + PAGE_RENDERERS[currentPage]();
  document.getElementById('pageContent').innerHTML = html;
  lastBanner = '';
  wireQuickActionForms();
}

function wireQuickActionForms() {
  const on = (id, fn) => { const el = document.getElementById(id); if (el) el.addEventListener('click', fn); };

  on('usePhoneBtnHome', () => {
    const p = document.getElementById('phoneInputHome').value.trim();
    if (p) { clearStoredPin(); setPhone(p); loadDashboard(); }
  });

  on('saleSubmit', () => {
    const item = document.getElementById('saleItem').value.trim();
    const qty = document.getElementById('saleQty').value.trim() || '1';
    const price = document.getElementById('salePrice').value.trim();
    if (!item || !price) return;
    sendCommand(`I sell ${qty} ${item} for ${price}`, finishWithBanner);
  });
  on('capitalSubmit', () => {
    const amt = document.getElementById('capitalAmount').value.trim();
    if (!amt) return;
    sendCommand(`my capital is ${amt}`, finishWithBanner);
  });
  on('expenseSubmit', () => {
    const cat = document.getElementById('expenseCategory').value.trim();
    const amt = document.getElementById('expenseAmount').value.trim();
    if (!cat || !amt) return;
    sendCommand(`I spend ${amt} on ${cat}`, finishWithBanner);
  });
  on('koloSubmit', () => {
    const amt = document.getElementById('koloAmount').value.trim();
    const goal = document.getElementById('koloGoal').value.trim();
    if (!amt) return;
    sendCommand(`I save ${amt}${goal ? ' for ' + goal : ''}`, finishWithBanner);
  });
  on('koloTargetSubmit', () => {
    const amt = document.getElementById('koloTargetAmount').value.trim();
    const goal = document.getElementById('koloTargetGoal').value.trim();
    if (!amt || !goal) return;
    sendCommand(`set kolo target ${amt} for ${goal}`, finishWithBanner);
  });
  on('debtSubmit', () => {
    const name = document.getElementById('debtName').value.trim();
    const amt = document.getElementById('debtAmount').value.trim();
    if (!name || !amt) return;
    sendCommand(`${name} owe me ${amt}`, finishWithBanner);
  });
  on('stockSubmit', () => {
    const item = document.getElementById('stockItem').value.trim();
    const qty = document.getElementById('stockQty').value.trim() || '1';
    const cost = document.getElementById('stockCost').value.trim();
    if (!item) return;
    sendCommand(`I don buy ${qty} ${item}${cost ? ' for ' + cost + ' each' : ''}`, finishWithBanner);
  });
  on('toolsSubmit', () => {
    const text = document.getElementById('toolsQuery').value.trim();
    if (!text) return;
    sendCommand(text, finishWithBanner);
  });
  on('pinSubmit', async () => {
    const newPin = document.getElementById('newPin').value.trim();
    const currentPin = document.getElementById('currentPin').value.trim();
    const recoveryWord = document.getElementById('recoveryWord').value.trim();
    if (!/^\d{4,6}$/.test(newPin)) { alert('PIN must be 4-6 numbers.'); return; }
    const phone = getPhone();
    try {
      const res = await fetch('/api/auth/set-pin', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, pin: newPin, currentPin: currentPin || undefined, recoveryWord: recoveryWord || undefined }),
      });
      const data = await res.json();
      if (!res.ok) { finishWithBanner(data.error || 'No fit save PIN.', true); return; }
      setStoredPin(newPin);
      finishWithBanner('PIN don save. Your ledger dey protected now.', false);
    } catch (err) {
      finishWithBanner('Network no dey work — try again.', true);
    }
  });
  on('resetPinSubmit', async () => {
    const recoveryWord = document.getElementById('resetRecoveryWord').value.trim();
    const newPin = document.getElementById('resetNewPin').value.trim();
    if (!recoveryWord || !/^\d{4,6}$/.test(newPin)) { alert('Abeg fill the secret word and a correct PIN (4-6 numbers).'); return; }
    const phone = getPhone();
    try {
      const res = await fetch('/api/auth/reset-pin', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, recoveryWord, newPin }),
      });
      const data = await res.json();
      if (!res.ok) { finishWithBanner(data.error || 'No fit reset PIN.', true); return; }
      setStoredPin(newPin);
      finishWithBanner('PIN don reset. Make sure you remember the new one this time o!', false);
    } catch (err) {
      finishWithBanner('Network no dey work — try again.', true);
    }
  });
  on('downloadReportBtn', async () => {
    const phone = getPhone();
    try {
      const res = await pinAwareFetch('/api/report/' + encodeURIComponent(phone));
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `buyna-report-${phone}.pdf`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (err) {
      alert('No fit download — try again.');
    }
  });
}

function finishWithBanner(reply, isError) {
  lastBanner = replyBanner(reply, isError);
  renderPage();
}

const sidebar = document.getElementById('sidebar');

  sidebar.classList.add('open'); overlay.classList.add('open');
});
overlay.addEventListener('click', closeSidebarOnMobile);

// ---------- Voice panel ----------
const voicePanel = document.getElementById('voicePanel');
const micFab = document.getElementById('micFab');
const micBtnInner = document.getElementById('micBtnInner');
const micLabel = document.getElementById('micLabel');
const voiceLog = document.getElementById('voiceLog');

micFab.addEventListener('click', () => voicePanel.classList.add('open'));
document.getElementById('voicePanelClose').addEventListener('click', () => voicePanel.classList.remove('open'));

function renderVoiceBubble(label, text, cls) {
  const div = document.createElement('div');
  div.className = 'bubble ' + (cls || 'you');
  div.innerHTML = `<div class="bubble-label">${label}</div><div></div>`;
  div.querySelector('div:last-child').textContent = text;
  voiceLog.prepend(div);
}

function speak(text) {
  if (!window.speechSynthesis) return;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-NG'; utter.rate = 0.95;
  window.speechSynthesis.speak(utter);
}

async function sendVoiceText(text) {
  renderVoiceBubble('You talk', text, 'you');
  sendCommand(text, (reply) => {
    renderVoiceBubble('BUYNA talk', reply, 'buyna');
    speak(reply);
    renderPage();
  });
}

document.getElementById('voiceTextSend').addEventListener('click', () => {
  const input = document.getElementById('voiceTextInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  sendVoiceText(text);
});

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null, listening = false;
if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = 'en-NG';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  recognition.onresult = (event) => sendVoiceText(event.results[0][0].transcript);
  recognition.onerror = () => { micLabel.textContent = 'I no hear well — tap try again'; };
  recognition.onend = () => {
    listening = false;
    micFab.classList.remove('listening'); micBtnInner.classList.remove('listening');
    if (micLabel.textContent === 'I dey listen...') micLabel.textContent = 'tap make you talk, or type for below';
  };
  [micBtnInner].forEach(btn => btn.addEventListener('click', () => {
    if (listening) return;
    listening = true;
    micFab.classList.add('listening'); micBtnInner.classList.add('listening');
    micLabel.textContent = 'I dey listen...';
    recognition.start();
  }));
  micBtnInner.innerHTML = '&#127908;';
} else {
  micBtnInner.style.display = 'none';
  micLabel.textContent = 'Voice need Chrome or Edge — abeg type instead';
}

// ---------- Init ----------
const savedPhone = getPhone();
if (savedPhone) document.getElementById('phoneInputSidebar').value = savedPhone;
loadDashboard();
</script>
